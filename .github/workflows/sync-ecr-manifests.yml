name: Sync ECR manifests

on:
  repository_dispatch:
    types: [ecr-manifest-update]
  workflow_dispatch:
    inputs:
      commit_message:
        description: 'Git commit subject (workflow_dispatch only; use repository_dispatch from maxoperf CI)'
        required: false
        type: string
        default: 'chore(ecr): manual manifest sync'

permissions:
  contents: write

jobs:
  sync:
    name: Apply ECR manifest files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write manifest files from dispatch payload
        if: github.event_name == 'repository_dispatch'
        env:
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path

          payload = json.loads(os.environ["CLIENT_PAYLOAD"])
          files = payload.get("files") or {}
          if not files:
              raise SystemExit("client_payload.files is empty")

          root = Path.cwd()
          for rel, encoded in files.items():
              path = root / rel
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_bytes(base64.standard_b64decode(encoded))
              print(f"wrote {rel}")

          msg_path = root / ".commit-message.txt"
          msg_path.write_text(payload.get("commit_message") or "chore(ecr): bump image overlays", encoding="utf-8")
          PY

      - name: Commit and push
        if: github.event_name == 'repository_dispatch'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/ecr-image-versions.yaml \
            deploy/helm/maxoperf/values-staging-images.yaml \
            deploy/helm/maxoperf/values-prod-images.yaml
          if git diff --cached --quiet; then
            echo "Manifests unchanged; skipping commit."
            exit 0
          fi
          git commit -F .commit-message.txt
          git push origin HEAD:main

      - name: Manual dispatch without payload
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "::error::Trigger this workflow via repository_dispatch from maxoperf CI, not empty workflow_dispatch."
          exit 1
